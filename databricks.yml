bundle:
  name: nestle-databricks-lakehouse
  version: "1.0.0"

environments:
  dev:
    workspace:
      host: ${var:databricks_host_dev}
      token: ${var:databricks_token_dev}
    
    variables:
      catalog: nestle_dev
      bronze_schema: bronze
      silver_schema: silver
      gold_schema: gold
      job_timeout: 900
      
  test:
    workspace:
      host: ${var:databricks_host_test}
      token: ${var:databricks_token_test}
    
    variables:
      catalog: nestle_test
      bronze_schema: bronze
      silver_schema: silver
      gold_schema: gold
      job_timeout: 1200
      
  prod:
    workspace:
      host: ${var:databricks_host_prod}
      token: ${var:databricks_token_prod}
    
    variables:
      catalog: nestle_prod
      bronze_schema: bronze
      silver_schema: silver
      gold_schema: gold
      job_timeout: 1800

variables:
  databricks_host_dev: ""
  databricks_token_dev: ""
  databricks_host_test: ""
  databricks_token_test: ""
  databricks_host_prod: ""
  databricks_token_prod: ""

resources:
  jobs:
    day1_pipeline:
      name: nestle_day1_sql_server_pipeline
      tasks:
        - task_key: bronze_load_day1
          notebook_task:
            notebook_path: /src/ingestion_framework_scripts/03_nb_load_day1_csv_to_bronze
          timeout_seconds: 900
          parameters:
            source_id: "sql_sales_transactions"
            day: "1"
        
        - task_key: dq_validation_day1
          notebook_task:
            notebook_path: /src/data_quality_framework/04_dq_validation_day1
          depends_on:
            - task_key: bronze_load_day1
          timeout_seconds: 600
        
        - task_key: watermark_update_day1
          notebook_task:
            notebook_path: /src/control_table_scripts/05_update_watermark_day1
          depends_on:
            - task_key: dq_validation_day1
          timeout_seconds: 300
        
        - task_key: silver_scd2_day1
          notebook_task:
            notebook_path: /src/silver/10_nb_silver_scd2_sales_transactions
          depends_on:
            - task_key: watermark_update_day1
          timeout_seconds: 900
        
        - task_key: silver_views_day1
          notebook_task:
            notebook_path: /src/silver/12_nb_silver_views
          depends_on:
            - task_key: silver_scd2_day1
          timeout_seconds: 600
        
        - task_key: gold_refresh_day1
          notebook_task:
            notebook_path: /src/gold/13_nb_gold_fact_and_materialized_views
          depends_on:
            - task_key: silver_views_day1
          timeout_seconds: 900
      
      schedule:
        quartz_cron_expression: "0 2 * * ?"
        timezone_id: "UTC"
      
      timeout_seconds: 5400
      max_retries: 1
      notification_settings:
        email_notifications:
          on_failure: ["raina.samiksha@nestle.com"]

    day2_pipeline:
      name: nestle_day2_sql_server_pipeline
      tasks:
        - task_key: bronze_load_day2
          notebook_task:
            notebook_path: /src/ingestion_framework_scripts/09_nb_load_day2_incremental
          timeout_seconds: 900
        
        - task_key: dq_validation_day2
          notebook_task:
            notebook_path: /src/data_quality_framework/07_nb_dq_validation_day2
          depends_on:
            - task_key: bronze_load_day2
          timeout_seconds: 600
        
        - task_key: watermark_update_day2
          notebook_task:
            notebook_path: /src/control_table_scripts/08_nb_update_watermark_day2
          depends_on:
            - task_key: dq_validation_day2
          timeout_seconds: 300
        
        - task_key: silver_scd2_day2
          notebook_task:
            notebook_path: /src/silver/14_nb_silver_scd2_day2_incremental
          depends_on:
            - task_key: watermark_update_day2
          timeout_seconds: 900
        
        - task_key: gold_refresh_day2
          notebook_task:
            notebook_path: /src/gold/15_nb_gold_day2_refresh
          depends_on:
            - task_key: silver_scd2_day2
          timeout_seconds: 900
      
      schedule:
        quartz_cron_expression: "0 3 * * ?"
        timezone_id: "UTC"
      
      timeout_seconds: 5400
      max_retries: 1

    day3_pipeline:
      name: nestle_day3_sql_server_pipeline
      tasks:
        - task_key: bronze_load_day3
          notebook_task:
            notebook_path: /src/ingestion_framework_scripts/16_nb_load_day3_incremental
          timeout_seconds: 900
        
        - task_key: dq_validation_day3
          notebook_task:
            notebook_path: /src/data_quality_framework/17_nb_dq_validation_day3
          depends_on:
            - task_key: bronze_load_day3
          timeout_seconds: 600
        
        - task_key: watermark_update_day3
          notebook_task:
            notebook_path: /src/control_table_scripts/18_nb_update_watermark_day3
          depends_on:
            - task_key: dq_validation_day3
          timeout_seconds: 300
        
        - task_key: silver_scd2_day3
          notebook_task:
            notebook_path: /src/silver/19_nb_silver_scd2_day3_incremental
          depends_on:
            - task_key: watermark_update_day3
          timeout_seconds: 900
        
        - task_key: gold_refresh_day3
          notebook_task:
            notebook_path: /src/gold/20_nb_gold_day3_refresh
          depends_on:
            - task_key: silver_scd2_day3
          timeout_seconds: 900
      
      schedule:
        quartz_cron_expression: "0 4 * * ?"
        timezone_id: "UTC"
      
      timeout_seconds: 5400
      max_retries: 1